<!DOCTYPE html>
<html>
<body>
    <h1> Taller Git </h1>
    <script>
        
        function calcularDescuento(precio, porcentaje) {
            return precio - (precio * (porcentaje / 100));
        }
        console.log("Precio con 20% dto: " + calcularDescuento(100, 20));
    

        function esPar(numero) {
            return numero % 2 === 0;
            }
            console.log("¿Es el número 46 par?: " + esPar(46));
            
    </script>


</body>
